<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us - Ereto Namunyak</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specific adjustments for this page */
        body {
            padding-top: 80px; /* Space for fixed nav */
        }
        .join-container {
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <!-- Top Bar Background -->
    <div class="top-bar-bg"></div>

    <!-- Navigation -->
    <nav>
        <button class="mobile-menu-toggle" aria-label="Toggle Menu">☰</button>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="index.html#about">About</a>
            <a href="index.html#projects">Projects</a>
            <a href="Join.html" class="active">Join Us</a>
            <a href="index.html#contact">Contact</a>
        </div>
    </nav>

    <!-- Join Us Form Section -->
    <section class="join-container fade-in show">
        <h2>Become a Member</h2>
        <p>Join the Ereto Namunyak community. Please fill out your details below.</p>
        
        <!-- The ID 'join-form' connects this to the logic in script.js -->
        <form id="join-form">
            <div class="form-group">
                <label for="name" style="text-align:left; display:block; color:var(--primary); margin-bottom:5px; font-weight:600;">Full Name</label>
                <input name="name" id="name" type="text" placeholder="e.g. Amos Tentemo" required>
            </div>
            
            <div class="form-group">
                <label for="email" style="text-align:left; display:block; color:var(--primary); margin-bottom:5px; font-weight:600;">Email Address</label>
                <input name="email" id="email" type="email" placeholder="e.g. name@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="phone" style="text-align:left; display:block; color:var(--primary); margin-bottom:5px; font-weight:600;">Phone Number</label>
                <input name="phone" id="phone" type="tel" placeholder="e.g. 0712345678" required>
            </div>

            <button type="submit">Submit Registration</button>
            <div id="join-status" aria-live="polite" style="margin-top: 15px;"></div>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-brand">
            <h3>Ereto Namunyak</h3>
        </div>
        <p>&copy; <span id="year"></span> Ereto Namunyak Organization</p>
    </footer>

    <!-- Existing Script handles the form submission automatically -->
    <script src="script.js"></script>
</body>
</html>
